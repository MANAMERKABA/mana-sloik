<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zagroda — MANA</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f4f0; color: #1a1a1a; font-size: 14px; }

header { background: #1a1a1a; color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 17px; font-weight: 500; }
header span { font-size: 12px; color: #888; margin-left: auto; }

nav { display: flex; gap: 0; background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 24px; }
nav button { padding: 12px 20px; border: none; background: none; cursor: pointer; font-size: 13px; color: #666; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s; }
nav button.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }
nav button:hover { color: #1a1a1a; }

.content { padding: 24px; }

.card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; overflow: hidden; }
.card-header { padding: 14px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
.card-header h2 { font-size: 14px; font-weight: 500; }
.card-sub { font-size: 11px; color: #aaa; }

.matrix-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }

th { text-align: left; padding: 9px 14px; font-size: 11px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid #f0f0f0; background: #fafafa; white-space: nowrap; }
th.row-header { min-width: 160px; }
th.col-header { text-align: center; min-width: 80px; }

td { padding: 9px 14px; border-bottom: 1px solid #f7f7f7; vertical-align: middle; }
td.row-name { font-weight: 500; white-space: nowrap; border-right: 1px solid #f0f0f0; background: #fafafa; }
td.cell { text-align: center; cursor: pointer; font-size: 15px; }
td.cell:hover { background: #f5f5f5; }
tr:last-child td { border-bottom: none; }

.dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
.dot-yes { background: #1D9E75; }
.dot-no { background: #e5e5e5; }

.sub-label { display: block; font-size: 10px; color: #bbb; font-weight: 400; }

.legend { display: flex; gap: 20px; padding: 12px 20px; border-top: 1px solid #f0f0f0; font-size: 12px; color: #888; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; }

.toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <span style="font-size:20px">🏡</span>
  <h1>Zagroda — MANA</h1>
  <span id="status">Łączenie...</span>
</header>

<nav>
  <button class="active" onclick="showTab('kafle')">Kafle × Ziarenka</button>
  <button onclick="showTab('pokoje')">Pokoje × Kafle</button>
  <button onclick="showTab('aplikacje')">Aplikacje × Pokoje</button>
</nav>

<div class="content">
  <div id="tab-kafle"></div>
  <div id="tab-pokoje" style="display:none"></div>
  <div id="tab-aplikacje" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://kkxhqtfxvgxdqpnzaufu.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtreGhxdGZ4dmd4ZHFwbnphdWZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MjE0NTYsImV4cCI6MjA4ODM5NzQ1Nn0.s8Ju-ww3G4_yyH6RedK2gwLveVJKD3hY2IHh62-qjfo';
const H = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function api(table, params='') {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}`, { headers: H });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function apiPatch(table, id, data) {
  return fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, { method:'PATCH', headers: H, body: JSON.stringify(data) });
}
async function apiPost(table, data) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, { method:'POST', headers: H, body: JSON.stringify(data) });
  return r.json();
}

let D = { aplikacje:[], pokoje:[], kafle:[], relacje:[] };
let activeTab = 'kafle';

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function showTab(tab) {
  document.querySelectorAll('nav button').forEach((b,i) => {
    b.classList.toggle('active', ['kafle','pokoje','aplikacje'][i] === tab);
  });
  ['kafle','pokoje','aplikacje'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? '' : 'none';
  });
  activeTab = tab;
  renderTab(tab);
}

function renderTab(tab) {
  if (tab === 'kafle') renderKafle();
  if (tab === 'pokoje') renderPokoje();
  if (tab === 'aplikacje') renderAplikacje();
}

function renderKafle() {
  const el = document.getElementById('tab-kafle');
  const kafle = D.kafle;
  if (!kafle.length) { el.innerHTML = '<p style="padding:40px;text-align:center;color:#bbb">Brak danych</p>'; return; }

  const wszystkieZ = [...new Set(kafle.flatMap(k => {
    try { return Array.isArray(k.ziarenka) ? k.ziarenka : JSON.parse(k.ziarenka||'[]'); }
    catch(e) { return []; }
  }))];

  let html = `<div class="card"><div class="card-header">
    <h2>Kafle × Ziarenka</h2>
    <span class="card-sub">${kafle.length} kafli · ${wszystkieZ.length} ziarenek</span>
  </div><div class="matrix-wrap"><table>
  <thead><tr><th class="row-header">Kafel</th>${wszystkieZ.map(z=>`<th class="col-header" title="${z}">${z.length>11?z.substring(0,10)+'…':z}</th>`).join('')}</tr></thead>
  <tbody>`;

  kafle.forEach(k => {
    let z = [];
    try { z = Array.isArray(k.ziarenka) ? k.ziarenka : JSON.parse(k.ziarenka||'[]'); } catch(e){}
    html += `<tr><td class="row-name">${k.nazwa}${k.nazwa==='Serce'?'<span class="sub-label">silnik</span>':''}</td>
    ${wszystkieZ.map(zi=>`<td class="cell"><span class="dot ${z.includes(zi)?'dot-yes':'dot-no'}"></span></td>`).join('')}</tr>`;
  });

  html += `</tbody></table></div>
  <div class="legend">
    <div class="legend-item"><span class="dot dot-yes"></span>ziarenko należy do kafla</div>
    <div class="legend-item"><span class="dot dot-no"></span>nie dotyczy</div>
  </div></div>`;
  el.innerHTML = html;
}

const STANY = ['aktywny','czesciowy','duch','planowany','nie_dotyczy'];
const IKONY = { aktywny:'✅', czesciowy:'🟡', duch:'🔵', planowany:'⏳', nie_dotyczy:'—' };
const LABELS = { aktywny:'aktywny', czesciowy:'częściowy', duch:'duch', planowany:'planowany', nie_dotyczy:'nie dotyczy' };

function getRel(pid, kid) {
  return D.relacje.find(r => r.pokoj_id===pid && r.kafel_id===kid);
}

async function cycleStatus(pojId, kafId) {
  const ex = getRel(pojId, kafId);
  if (ex) {
    const next = STANY[(STANY.indexOf(ex.status)+1) % STANY.length];
    await apiPatch('pokoje_kafle', ex.id, { status: next });
    ex.status = next;
    toast(IKONY[next] + ' ' + LABELS[next]);
  } else {
    const res = await apiPost('pokoje_kafle', { pokoj_id: pojId, kafel_id: kafId, status: 'planowany' });
    if (res && res[0]) D.relacje.push(res[0]);
    toast('⏳ planowany — dodano');
  }
  renderPokoje();
}

function renderPokoje() {
  const el = document.getElementById('tab-pokoje');
  const { pokoje, kafle } = D;
  if (!pokoje.length) { el.innerHTML = '<p style="padding:40px;text-align:center;color:#bbb">Brak danych</p>'; return; }

  let html = `<div class="card"><div class="card-header">
    <h2>Pokoje × Kafle</h2>
    <span class="card-sub">${pokoje.length} pokoi · ${kafle.length} kafli · kliknij aby zmienić status</span>
  </div><div class="matrix-wrap"><table>
  <thead><tr><th class="row-header">Pokój</th>${kafle.map(k=>`<th class="col-header" title="${k.nazwa}">${k.nazwa.length>10?k.nazwa.substring(0,9)+'…':k.nazwa}</th>`).join('')}</tr></thead>
  <tbody>`;

  pokoje.forEach(p => {
    const app = D.aplikacje.find(a=>a.id===p.aplikacja_id);
    html += `<tr><td class="row-name">${p.nazwa}${app?`<span class="sub-label">${app.nazwa}</span>`:''}</td>
    ${kafle.map(k => {
      const rel = getRel(p.id, k.id);
      return `<td class="cell" title="${p.nazwa} × ${k.nazwa}${rel&&rel.notatka?' — '+rel.notatka:''}" onclick="cycleStatus('${p.id}','${k.id}')">${rel?IKONY[rel.status]:'·'}</td>`;
    }).join('')}</tr>`;
  });

  html += `</tbody></table></div>
  <div class="legend">
    ${STANY.map(s=>`<div class="legend-item">${IKONY[s]} ${LABELS[s]}</div>`).join('')}
    <div class="legend-item">· brak — kliknij aby dodać</div>
  </div></div>`;
  el.innerHTML = html;
}

function renderAplikacje() {
  const el = document.getElementById('tab-aplikacje');
  const { aplikacje, pokoje } = D;
  if (!aplikacje.length) { el.innerHTML = '<p style="padding:40px;text-align:center;color:#bbb">Brak danych</p>'; return; }

  let html = `<div class="card"><div class="card-header">
    <h2>Aplikacje × Pokoje</h2>
    <span class="card-sub">${aplikacje.length} aplikacji · ${pokoje.length} pokoi</span>
  </div><div class="matrix-wrap"><table>
  <thead><tr><th class="row-header">Aplikacja</th>${pokoje.map(p=>`<th class="col-header" title="${p.nazwa}">${p.nazwa.length>10?p.nazwa.substring(0,9)+'…':p.nazwa}</th>`).join('')}</tr></thead>
  <tbody>`;

  aplikacje.forEach(a => {
    html += `<tr><td class="row-name">${a.nazwa}</td>
    ${pokoje.map(p=>`<td class="cell"><span class="dot ${p.aplikacja_id===a.id?'dot-yes':'dot-no'}"></span></td>`).join('')}</tr>`;
  });

  html += `</tbody></table></div>
  <div class="legend">
    <div class="legend-item"><span class="dot dot-yes"></span>pokój należy do aplikacji</div>
    <div class="legend-item"><span class="dot dot-no"></span>nie dotyczy</div>
  </div></div>`;
  el.innerHTML = html;
}

async function loadAll() {
  document.getElementById('status').textContent = 'Ładowanie...';
  try {
    const [aplikacje, pokoje, kafle, relacje] = await Promise.all([
      api('aplikacje','order=nazwa'),
      api('pokoje','order=nazwa'),
      api('kafle','order=nazwa'),
      api('pokoje_kafle','select=*')
    ]);
    D = { aplikacje, pokoje, kafle, relacje };
    document.getElementById('status').textContent = `${aplikacje.length} aplikacji · ${pokoje.length} pokoi · ${kafle.length} kafli`;
    renderTab(activeTab);
  } catch(e) {
    document.getElementById('status').textContent = 'Błąd połączenia';
    console.error(e);
  }
}

loadAll();
</script>
</body>
</html>
