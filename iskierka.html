<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spokojna Noc — MANA</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;}

  /* ═══ SKY ═══ */
  #sky{
    position:fixed;inset:0;
    background:radial-gradient(ellipse at 50% 0%, #0d1b2a 0%, #060d18 40%, #020508 100%);
    overflow:hidden;
  }

  /* Atmosferyczna poświata na horyzoncie */
  #sky::after{
    content:'';position:absolute;bottom:0;left:0;right:0;height:35%;
    background:linear-gradient(to top, rgba(15,25,50,0.6) 0%, transparent 100%);
    pointer-events:none;
  }

  /* Mgławica — subtelna, nieruchoma */
  .nebula{
    position:absolute;border-radius:50%;pointer-events:none;
    filter:blur(60px);mix-blend-mode:screen;
  }
  .nb1{width:55vw;height:40vw;top:5%;left:10%;
    background:radial-gradient(circle,rgba(30,50,120,0.18) 0%,transparent 70%);}
  .nb2{width:40vw;height:35vw;top:20%;right:5%;
    background:radial-gradient(circle,rgba(60,20,100,0.12) 0%,transparent 70%);}
  .nb3{width:30vw;height:25vw;top:50%;left:40%;
    background:radial-gradient(circle,rgba(20,60,80,0.1) 0%,transparent 70%);}

  /* ═══ CANVAS GWIAZD ═══ */
  #star-canvas{position:fixed;inset:0;pointer-events:none;}
  #const-svg{position:fixed;inset:0;}

  /* ═══ UI ═══ */
  #ui{
    position:fixed;inset:0;
    display:flex;flex-direction:column;
    padding:env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,20px);
  }

  /* Górny pasek */
  .top-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 22px 0;
    flex-shrink:0;
  }
  .back-btn{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;padding:8px 14px;
    color:rgba(255,255,255,0.6);
    font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
    cursor:pointer;transition:all .2s;
  }
  .back-btn:active{transform:scale(.95);}
  .top-title{
    font-family:'Cinzel',serif;font-size:13px;
    color:rgba(255,255,255,0.35);letter-spacing:3px;
  }
  .moon-phase{font-size:22px;filter:drop-shadow(0 0 8px rgba(200,220,255,0.4));}

  /* Środek — przewijalne niebo (spacer) */
  .sky-space{flex:1;}

  /* Panel dolny — formularz */
  .bottom-panel{
    flex-shrink:0;
    padding:0 18px 16px;
  }

  /* Kolor karteczki */
  .color-row{
    display:flex;gap:10px;margin-bottom:14px;justify-content:center;
  }
  .cdot{
    width:36px;height:36px;border-radius:50%;cursor:pointer;
    transition:transform .15s,box-shadow .15s;
    border:2.5px solid transparent;flex-shrink:0;
  }
  .cdot.sel{border-color:rgba(255,255,255,0.9);transform:scale(1.18);}

  /* Pole tekstowe */
  .txt-wrap{position:relative;margin-bottom:12px;}
  .sn-textarea{
    width:100%;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:18px;
    padding:16px 18px;
    color:#f0eafa;
    font-family:'Nunito',sans-serif;font-size:16px;
    outline:none;resize:none;
    line-height:1.5;
    transition:border-color .2s,background .2s;
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
  }
  .sn-textarea:focus{
    border-color:rgba(180,140,255,0.4);
    background:rgba(255,255,255,0.08);
  }
  .sn-textarea::placeholder{color:rgba(200,190,230,0.35);}

  /* Przycisk */
  .send-btn{
    width:100%;padding:16px;border:none;border-radius:18px;
    background:linear-gradient(135deg,rgba(120,60,220,0.7),rgba(80,40,160,0.8));
    border:1px solid rgba(180,120,255,0.25);
    color:#f0eafa;font-family:'Nunito',sans-serif;
    font-size:16px;font-weight:700;cursor:pointer;
    transition:all .2s;
    backdrop-filter:blur(8px);
    box-shadow:0 4px 20px rgba(100,40,200,0.3);
  }
  .send-btn:active{transform:scale(.97);}

  /* ═══ POPUP KONSTELACJI ═══ */
  #const-popup{
    display:none;
    position:fixed;
    background:rgba(8,14,30,0.92);
    border:1px solid rgba(180,200,255,0.15);
    border-radius:20px;
    padding:18px 20px;
    max-width:260px;
    z-index:200;
    backdrop-filter:blur(20px);
    box-shadow:0 8px 40px rgba(0,0,10,0.8);
    animation:popIn .25s ease;
  }
  @keyframes popIn{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
  #const-popup.visible{display:block;}
  .popup-close{
    position:absolute;top:10px;right:14px;
    background:none;border:none;color:rgba(255,255,255,0.3);
    font-size:18px;cursor:pointer;line-height:1;
    font-family:'Nunito',sans-serif;
  }
  .popup-name{
    font-family:'Cinzel',serif;font-size:15px;
    color:#c8d8ff;letter-spacing:1.5px;margin-bottom:3px;
  }
  .popup-latin{
    font-size:10px;color:rgba(180,200,255,0.4);
    letter-spacing:1px;margin-bottom:10px;font-style:italic;
  }
  .popup-stars{font-size:11px;color:rgba(200,210,255,0.5);margin-bottom:8px;}
  .popup-desc{
    font-size:13px;color:rgba(220,225,245,0.75);
    line-height:1.6;
  }
  .popup-tip{
    margin-top:10px;padding-top:10px;
    border-top:1px solid rgba(255,255,255,0.07);
    font-size:11px;color:rgba(180,190,230,0.45);
    font-style:italic;
  }

  /* ═══ HINT ═══ */
  #sky-hint{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    text-align:center;pointer-events:none;
    animation:hintFade 4s ease forwards;
    z-index:50;
  }
  @keyframes hintFade{0%{opacity:0;}15%{opacity:1;}70%{opacity:1;}100%{opacity:0;}}
  .hint-text{
    font-size:12px;font-weight:700;letter-spacing:2px;
    color:rgba(200,210,255,0.45);text-transform:uppercase;
  }

  /* ═══ POTWIERDZENIE ═══ */
  #confirm-screen{
    display:none;position:fixed;inset:0;z-index:300;
    flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px;
  }
  #confirm-screen.visible{display:flex;}
  .confirm-msg{
    font-size:18px;font-weight:600;color:rgba(220,215,250,0.9);
    line-height:1.6;margin-bottom:32px;max-width:280px;
  }
  .confirm-btn{
    padding:14px 32px;border-radius:40px;border:none;
    background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
    color:rgba(255,255,255,0.7);font-family:'Nunito',sans-serif;
    font-size:15px;font-weight:700;cursor:pointer;
  }

  /* ═══ ANIMACJA KARTECZKI ═══ */
  .fly-note{
    position:fixed;border-radius:8px;z-index:400;pointer-events:none;
    font-size:11px;font-weight:700;color:#fff;
    padding:6px 12px;display:flex;align-items:center;justify-content:center;
    text-align:center;
  }
</style>
</head>

<!-- TŁO NIEBA -->
<div id="sky">

  <div class="nebula nb2"></div>
  <div class="nebula nb3"></div>
</div>

<!-- CANVAS GWIAZD (tło — losowe) -->
<canvas id="star-canvas"></canvas>

<!-- SVG KONSTELACJI (interaktywne) -->
<svg id="const-svg" xmlns="http://www.w3.org/2000/svg"></svg>

<!-- POPUP KONSTELACJI -->

  <button class="popup-close" onclick="closePopup()">×</button>
  <div class="popup-name" id="p-name"></div>
  <div class="popup-latin" id="p-latin"></div>
  <div class="popup-stars" id="p-stars"></div>
  <div class="popup-desc" id="p-desc"></div>
  <div class="popup-tip" id="p-tip"></div>
</div>

<!-- HINT -->
<div id="sky-hint">
  <div class="hint-text">dotknij konstelację</div>
</div>

<!-- UI -->
<div id="ui">
  <div class="top-bar">
    <button class="back-btn" onclick="history.back()">← Wróć</button>
    <div class="top-title">SPOKOJNA NOC</div>
    <div class="moon-phase" id="moon-em">🌔</div>
  </div>

  <div class="sky-space"></div>

  <div class="bottom-panel">
    <div class="color-row" id="color-row"></div>
    <div class="txt-wrap">
      <textarea class="sn-textarea" id="sn-txt" rows="3"
        placeholder="Co chcesz zostawić za sobą tej nocy..."></textarea>
    </div>
    <button class="send-btn" onclick="submitNote()">Wrzuć do słoika 🫙</button>
  </div>
</div>

<!-- POTWIERDZENIE -->
<div id="confirm-screen">
  <div class="confirm-msg" id="confirm-msg">Twoja myśl jest już bezpieczna. 🌙</div>
  <button class="confirm-btn" onclick="resetForm()">Dobranoc ✦</button>
</div>

/* ═══════════════════════════════════
   MOON
═══════════════════════════════════ */
function getMoon() {
  const known = new Date(2000,0,6);
  const diff = (new Date() - known) / (1000*60*60*24);
  const c = ((diff % 29.53059) + 29.53059) % 29.53059;
  if(c<1.85) return{e:'🌑',n:'Nów'};
  if(c<7.38) return{e:'🌒',n:'Przybywający sierp'};
  if(c<11.07) return{e:'🌓',n:'Pierwsza kwadra'};
  if(c<14.77) return{e:'🌔',n:'Przybywający garb'};
  if(c<18.46) return{e:'🌕',n:'Pełnia'};
  if(c<22.15) return{e:'🌖',n:'Ubywający garb'};
  if(c<25.84) return{e:'🌗',n:'Ostatnia kwadra'};
  return{e:'🌘',n:'Ubywający sierp'};
}

   GWIAZDY TŁA
═══════════════════════════════════ */
function drawBackgroundStars() {
  const canvas = document.getElementById('star-canvas');
  const W = window.innerWidth, H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Losowe gwiazdy tła
  const count = Math.floor((W * H) / 2800);
  for(let i = 0; i < count; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H * 0.75; // Tylko górna część
    const r = Math.random() * 1.2 + 0.2;
    const alpha = Math.random() * 0.6 + 0.15;

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);

    // Kolory gwiazd — różne temperatury
    const colors = [
      `rgba(200,215,255,${alpha})`,   // niebiesko-biała
      `rgba(255,255,240,${alpha})`,   // biała
      `rgba(255,235,200,${alpha})`,   // żółto-biała
      `rgba(255,200,150,${alpha*0.7})`, // pomarańczowa (rzadsza)
    ];
    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
    ctx.fill();

    // Migotanie — różne opacities
    if(Math.random() > 0.7) {
      ctx.beginPath();
      ctx.arc(x, y, r * 2.5, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,215,255,${alpha * 0.08})`;
      ctx.fill();
    }
  }

  // Droga Mleczna — subtelny obłok
  const gradient = ctx.createLinearGradient(W*0.3, 0, W*0.7, H*0.6);
  gradient.addColorStop(0, 'rgba(120,140,200,0)');
  gradient.addColorStop(0.3, 'rgba(120,140,200,0.04)');
  gradient.addColorStop(0.5, 'rgba(150,160,220,0.06)');
  gradient.addColorStop(0.7, 'rgba(120,140,200,0.04)');
  gradient.addColorStop(1, 'rgba(120,140,200,0)');

  ctx.save();
  ctx.rotate(-0.3);
  ctx.translate(-W*0.1, -H*0.05);
  ctx.fillStyle = gradient;
  ctx.fillRect(-W, -H, W*3, H*2);
  ctx.restore();
}

/* ═══════════════════════════════════
   KONSTELACJE SVG
═══════════════════════════════════ */
let rotationAngle = 0; // stopnie — bardzo wolna rotacja

function drawConstellations() {
  const svg = document.getElementById('const-svg');
  const W = window.innerWidth, H = window.innerHeight;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = '';

  // Defs — filtry
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = `
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  `;
  svg.appendChild(defs);

  CONSTELLATIONS.forEach(con => {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor = 'pointer';

    // Konwertuj % → px z uwzględnieniem rotacji
    const pts = con.stars.map(s => {
      const px = (s.x / 100) * W;
      const py = (s.y / 100) * (H * 0.72); // Konstelacje w górnych 72% ekranu
      // Subtelna rotacja wokół centrum
      const cx = W/2, cy = H*0.35;
      const rad = rotationAngle * Math.PI / 180;
      const rx = cx + (px-cx)*Math.cos(rad) - (py-cy)*Math.sin(rad);
      const ry = cy + (px-cx)*Math.sin(rad) + (py-cy)*Math.cos(rad);
      return {x:rx, y:ry, r:s.r||1.8, name:s.name};
    });

    // Linie między gwiazdami
    con.lines.forEach(([a,b]) => {
      // Glow
      const glow = document.createElementNS('http://www.w3.org/2000/svg','line');
      glow.setAttribute('x1', pts[a].x); glow.setAttribute('y1', pts[a].y);
      glow.setAttribute('x2', pts[b].x); glow.setAttribute('y2', pts[b].y);
      glow.setAttribute('stroke', 'rgba(160,180,255,0.06)');
      glow.setAttribute('stroke-width', '3');
      glow.setAttribute('filter', 'url(#lineGlow)');
      g.appendChild(glow);

      // Linia
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', pts[a].x); line.setAttribute('y1', pts[a].y);
      line.setAttribute('x2', pts[b].x); line.setAttribute('y2', pts[b].y);
      line.setAttribute('stroke', 'rgba(160,180,255,0.18)');
      line.setAttribute('stroke-width', '0.8');
      line.setAttribute('stroke-dasharray', '3 4');
      g.appendChild(line);
    });

    // Gwiazdy
    pts.forEach(pt => {
      // Poświata
      const glow = document.createElementNS('http://www.w3.org/2000/svg','circle');
      glow.setAttribute('cx', pt.x); glow.setAttribute('cy', pt.y);
      glow.setAttribute('r', pt.r * 3);
      glow.setAttribute('fill', 'rgba(200,215,255,0.06)');
      g.appendChild(glow);

      // Gwiazda
      const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx', pt.x); circle.setAttribute('cy', pt.y);
      circle.setAttribute('r', pt.r);
      circle.setAttribute('fill', 'rgba(230,238,255,0.92)');
      circle.setAttribute('filter', 'url(#starGlow)');
      g.appendChild(circle);
    });

    // Niewidoczna strefa dotyku (większa)
    const centerX = pts.reduce((s,p)=>s+p.x,0)/pts.length;
    const centerY = pts.reduce((s,p)=>s+p.y,0)/pts.length;
    const touchZone = document.createElementNS('http://www.w3.org/2000/svg','circle');
    touchZone.setAttribute('cx', centerX); touchZone.setAttribute('cy', centerY);
    touchZone.setAttribute('r', '38');
    touchZone.setAttribute('fill', 'transparent');
    g.appendChild(touchZone);

    // Etykieta (bardzo subtelna)
    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x', centerX); label.setAttribute('y', centerY + 28);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('fill', 'rgba(180,200,255,0.22)');
    label.setAttribute('font-size', '9');
    label.setAttribute('font-family', 'Cinzel, serif');
    label.setAttribute('letter-spacing', '1.5');
    label.textContent = con.name.toUpperCase();
    g.appendChild(label);

    // Klik/tap
    g.addEventListener('click', (e) => {
      e.stopPropagation();
      showPopup(con, centerX, centerY);
    });

    svg.appendChild(g);
  });
}

/* ═══════════════════════════════════
   ROTACJA NIEBA
═══════════════════════════════════ */
let rotationTimer = null;

function startRotation() {
  // 1 pełna rotacja = 24 godziny = 86400000ms
  // Ale dla celów demo: 1 obrót = 4 minuty (żeby widać było ruch)
  // Prawdziwa prędkość: 360 / 86400 = 0.00417 stopni/sekundę
  // Demo: 360 / 240 = 1.5 stopnia/sekundę → za szybko
  // Kompromis: 1 obrót = 20 minut → 0.03 stopnia/sekundę
  const ROTATION_SPEED = 0.008; // stopni na sekundę (ok. 8° na minutę — ledwo widoczne)

  rotationTimer = setInterval(() => {
    rotationAngle += ROTATION_SPEED * (1/10);
    if(rotationAngle >= 360) rotationAngle = 0;
    drawConstellations();
  }, 100); // co 100ms
}

/* ═══════════════════════════════════
   POPUP
═══════════════════════════════════ */
function showPopup(con, cx, cy) {
  const popup = document.getElementById('const-popup');
  document.getElementById('p-name').textContent = con.name;
  document.getElementById('p-latin').textContent = con.latin + ' · najlepiej widoczna: ' + con.season;
  document.getElementById('p-stars').textContent = '✦ ' + con.mainStar;
  document.getElementById('p-desc').textContent = con.desc;
  document.getElementById('p-tip').textContent = '👁 ' + con.tip;

  // Pozycja popupu
  const W = window.innerWidth, H = window.innerHeight;
  const popW = 260, popH = 200;
  let left = cx - popW/2;
  let top = cy + 30;

  // Nie wychodź poza ekran
  left = Math.max(10, Math.min(left, W - popW - 10));
  top = Math.max(70, Math.min(top, H - popH - 120));

  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
  popup.classList.add('visible');
}

function closePopup() {
  document.getElementById('const-popup').classList.remove('visible');
}

// Klik poza popup = zamknij
document.getElementById('const-svg').addEventListener('click', () => {
  closePopup();
});

/* ═══════════════════════════════════
   KOLORY KARTECZEK
═══════════════════════════════════ */
const COLORS = ['#9b59b6','#3498db','#2ecc71','#e67e22','#e74c3c','#f1c40f'];
let selectedColor = COLORS[0];

function buildColors() {
  const row = document.getElementById('color-row');
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'cdot' + (c === selectedColor ? ' sel' : '');
    d.style.background = c;
    d.style.boxShadow = '0 2px 10px ' + c + '66';
    d.onclick = () => {
      selectedColor = c;
      document.querySelectorAll('.cdot').forEach(x => x.classList.remove('sel'));
      d.classList.add('sel');
    };
    row.appendChild(d);
  });
}

/* ═══════════════════════════════════
   SUBMIT
═══════════════════════════════════ */
const CONFIRMS = [
  'Twoja myśl jest już bezpieczna. 🌙',
  'Głowa wolna. Można spać.',
  'Słoik przyjął. Możesz odpuścić.',
  'Odłożone. Nie musisz tego nosić.',
  'Dobrze, że to powiedziałeś. 🌙'
];

function submitNote() {
  const txt = document.getElementById('sn-txt').value.trim();
  if(!txt) { document.getElementById('sn-txt').focus(); return; }

  // Animacja karteczki
  const note = document.createElement('div');
  note.className = 'fly-note';
  note.style.cssText = `background:${selectedColor};left:50%;bottom:120px;transform:translateX(-50%);opacity:1;transition:none;max-width:180px;`;
  note.textContent = txt.length > 20 ? txt.slice(0,20)+'…' : txt;
  document.body.appendChild(note);

  setTimeout(() => {
    note.style.transition = 'all 1.2s cubic-bezier(.4,0,.2,1)';
    note.style.bottom = '85%';
    note.style.opacity = '0';
    note.style.transform = 'translateX(-50%) scale(.15)';
  }, 50);
  setTimeout(() => { note.remove(); }, 1300);

  // Potwierdzenie
  setTimeout(() => {
    const msg = CONFIRMS[Math.floor(Math.random()*CONFIRMS.length)];
    document.getElementById('confirm-msg').textContent = msg;
    document.getElementById('confirm-screen').classList.add('visible');
  }, 900);
}

function resetForm() {
  document.getElementById('sn-txt').value = '';
  document.getElementById('confirm-screen').classList.remove('visible');
}

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  // Księżyc
  const moon = getMoon();
  document.getElementById('moon-em').textContent = moon.e;
  document.getElementById('moon-em').title = moon.n;

  // Gwiazdy tła
  drawBackgroundStars();

  // Konstelacje
  drawConstellations();

  // Rotacja
  startRotation();

  // Kolory
  buildColors();

  // Schowaj hint po 4s
  setTimeout(() => {
    const hint = document.getElementById('sky-hint');
    if(hint) hint.style.display = 'none';
  }, 4500);
});

// Resize
window.addEventListener('resize', () => {
  drawBackgroundStars();
  drawConstellations();
});
</script>
