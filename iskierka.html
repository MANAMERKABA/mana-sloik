<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#03080f">
<title>Magic Jar</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#020508;}

/* ═══ GRID ═══ */
.scene{position:fixed;inset:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
.q{position:relative;overflow:hidden;}
.q svg{position:absolute;inset:0;width:100%;height:100%;}

/* Quadrant base colors */
.q-wind {background:#071428;}
.q-water{background:#020e20;}
.q-fire {background:#130404;}
.q-earth{background:#050f04;}

/* Center radial vignette — darkens where quadrants meet, frames the parchment */
.vignette{
  position:fixed;inset:0;pointer-events:none;z-index:8;
  background:radial-gradient(ellipse 55% 52% at 50% 50%,transparent 20%,rgba(0,0,0,0.65) 70%,rgba(0,0,0,0.9) 100%);
}

/* ═══ PARCHMENT CARD — irregular scroll/bark shape ═══ */
.parchment-wrap{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:20;
  width:min(310px,88vw);
  animation:parchmentIn 1.4s cubic-bezier(0.16,1,0.3,1) both;
  filter:drop-shadow(0 0 38px rgba(255,130,20,0.18)) drop-shadow(0 20px 60px rgba(0,0,0,0.96));
}
.parchment-wrap svg.scroll-bg{display:block;width:100%;overflow:visible;}

/* Content sits on top of SVG shape */
.parchment{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  padding:clamp(22px,6vw,36px) clamp(18px,5vw,30px) clamp(26px,6vw,40px);
  display:flex;flex-direction:column;
}
@keyframes parchmentIn{
  from{opacity:0;transform:translate(-50%,-50%) scale(0.88) translateY(10px);}
  to{opacity:1;transform:translate(-50%,-50%) scale(1) translateY(0);}
}

/* Glyph at top */
.p-glyph{
  text-align:center;font-size:26px;margin-bottom:4px;margin-top:4px;
  filter:drop-shadow(0 0 8px rgba(170,110,15,0.55));
  animation:glyphPulse 3s ease-in-out infinite;
}
@keyframes glyphPulse{
  0%,100%{filter:drop-shadow(0 0 6px rgba(170,110,15,0.4));}
  50%{filter:drop-shadow(0 0 14px rgba(200,140,20,0.7));}
}

.p-title{
  font-family:'Cinzel',serif;font-size:21px;font-weight:700;
  color:#1e1005;text-align:center;letter-spacing:4px;
  text-shadow:0 1px 0 rgba(255,225,140,0.6);
  margin-bottom:3px;
}
.p-sub{
  font-family:'Lora',serif;font-style:italic;font-size:11.5px;
  color:#6a4818;text-align:center;opacity:0.78;margin-bottom:18px;
}

/* Rune divider */
.rune-sep{
  display:flex;align-items:center;gap:10px;margin-bottom:18px;
}
.rune-sep::before,.rune-sep::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(110,72,20,0.45),transparent);
}
.rune-sep span{font-size:13px;color:rgba(110,72,20,0.5);flex-shrink:0;}

/* Labels */
.p-label{
  font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:2.5px;
  color:#5a3812;display:block;margin-bottom:6px;
}

/* Inputs */
.p-inp{
  width:100%;
  background:rgba(255,252,238,0.72);
  border:1px solid rgba(110,72,25,0.32);
  border-radius:2px 5px 3px 4px;
  padding:11px 13px;
  font-family:'Lora',serif;font-size:15.5px;color:#18100a;
  outline:none;margin-bottom:15px;
  transition:border-color .2s,box-shadow .2s;
  box-shadow:inset 0 1px 4px rgba(0,0,0,0.08);
}
.p-inp::placeholder{color:rgba(110,72,25,0.42);font-style:italic;}
.p-inp:focus{
  border-color:rgba(160,100,18,0.6);
  box-shadow:inset 0 1px 4px rgba(0,0,0,0.08),0 0 0 2.5px rgba(185,120,18,0.14);
}

/* Button */
.p-btn{
  width:100%;padding:13px 16px;margin-top:2px;
  background:linear-gradient(150deg,#241508,#3a2208);
  border:1px solid rgba(185,125,28,0.42);
  border-radius:2px 5px 3px 4px;
  font-family:'Cinzel',serif;font-size:12px;font-weight:600;
  letter-spacing:2.5px;color:#d4a030;
  cursor:pointer;
  box-shadow:0 3px 14px rgba(0,0,0,0.45),inset 0 1px 0 rgba(210,155,40,0.18);
  transition:all .22s;
}
.p-btn:hover{
  background:linear-gradient(150deg,#3a2208,#552e0a);
  box-shadow:0 5px 22px rgba(0,0,0,0.55),0 0 18px rgba(185,120,20,0.18);
}
.p-btn:active{transform:scale(0.97);}

/* Steps */
.ob-step{display:none;}
.ob-step.active{display:block;}

/* Back button */
.back-lnk{
  background:none;border:none;font-family:'Lora',serif;font-style:italic;
  font-size:12.5px;color:#6a4818;cursor:pointer;padding:3px 0;
  margin-bottom:14px;display:block;opacity:0.68;
}
.back-lnk:hover{opacity:1;}

/* Jar grid */
.jar-grid{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0 18px;}
.jar-opt{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:9px 10px;border-radius:2px 5px 3px 4px;
  border:1.5px solid rgba(110,72,25,0.22);
  cursor:pointer;transition:all .15s;
  background:rgba(255,248,228,0.45);
  font-family:'Cinzel',serif;font-size:9px;color:#5a3812;letter-spacing:1.5px;
}
.jar-opt:hover{border-color:rgba(165,105,20,0.5);background:rgba(255,240,195,0.65);}
.jar-opt.sel{
  border-color:rgba(165,105,20,0.85);
  background:rgba(255,235,175,0.82);
  box-shadow:0 0 10px rgba(185,120,20,0.18);
}
.jar-opt span{font-size:24px;}

/* Shake error */
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.shake{animation:shake .38s ease;}

/* ═══ SHARED ANIMATIONS ═══ */
@keyframes twinkle{0%,100%{opacity:.12}50%{opacity:.9}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* Wind */
@keyframes windLine{
  0%{stroke-dashoffset:500;opacity:0;}
  8%{opacity:.7;}
  85%{opacity:.35;}
  100%{stroke-dashoffset:0;opacity:0;}
}
@keyframes leafDrift1{
  0%{transform:translate(0,0) rotate(0deg);opacity:0;}
  10%{opacity:.75;}
  90%{opacity:.4;}
  100%{transform:translate(90px,-25px) rotate(200deg);opacity:0;}
}
@keyframes leafDrift2{
  0%{transform:translate(0,0) rotate(20deg);opacity:0;}
  12%{opacity:.7;}
  88%{opacity:.3;}
  100%{transform:translate(110px,-15px) rotate(-120deg);opacity:0;}
}
@keyframes leafDrift3{
  0%{transform:translate(0,0) rotate(-10deg);opacity:0;}
  8%{opacity:.8;}
  92%{opacity:.35;}
  100%{transform:translate(80px,-35px) rotate(150deg);opacity:0;}
}

/* Water */
@keyframes rippleOut{
  from{transform:scale(0.25);opacity:.7;}
  to{transform:scale(1);opacity:0;}
}
@keyframes wfall{
  from{transform:translateY(-5px);opacity:.6;}
  to{transform:translateY(8px);opacity:.1;}
}
@keyframes moonPulse{
  0%,100%{opacity:.88;}
  50%{opacity:1;}
}

/* Fire */
@keyframes flicker{
  0%,100%{transform:scaleX(1)scaleY(1);}
  25%{transform:scaleX(.93)scaleY(1.07);}
  50%{transform:scaleX(1.04)scaleY(.96);}
  75%{transform:scaleX(.96)scaleY(1.04);}
}
@keyframes sparksA{0%{transform:translate(0,0);opacity:1;}100%{transform:translate(7px,-52px);opacity:0;}}
@keyframes sparksB{0%{transform:translate(0,0);opacity:1;}100%{transform:translate(-6px,-48px);opacity:0;}}
@keyframes sparksC{0%{transform:translate(0,0);opacity:1;}100%{transform:translate(11px,-60px);opacity:0;}}
@keyframes sparksD{0%{transform:translate(0,0);opacity:1;}100%{transform:translate(-9px,-55px);opacity:0;}}
@keyframes sparksE{0%{transform:translate(0,0);opacity:1;}100%{transform:translate(4px,-50px);opacity:0;}}
@keyframes sparksF{0%{transform:translate(0,0);opacity:1;}100%{transform:translate(-4px,-58px);opacity:0;}}
@keyframes emberGlow{0%,100%{opacity:.3;}50%{opacity:.8;}}

/* Earth */
@keyframes sway1{0%,100%{transform:rotate(-2.5deg);}50%{transform:rotate(2.5deg);}}
@keyframes sway2{0%,100%{transform:rotate(-1.8deg);}50%{transform:rotate(2deg);}}
@keyframes sway3{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(1.5deg);}}
@keyframes firefly{0%,100%{opacity:0;r:1;}45%,55%{opacity:.95;r:1.6;}}
@keyframes firefly2{0%,100%{opacity:0;}50%{opacity:.8;}}
</style>
</head>
<body>

<div class="scene">

  <!-- ════════════ WIND — top left ════════════ -->
  <div class="q q-wind">
    <svg viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="wSky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0a1830"/>
          <stop offset="100%" stop-color="#1a3a5c"/>
        </linearGradient>
      </defs>
      <rect width="200" height="200" fill="url(#wSky)"/>

      <!-- Stars — bright -->
      <circle cx="18" cy="12" r="1.2" fill="white" opacity=".9" style="animation:twinkle 3.1s infinite .1s"/>
      <circle cx="52" cy="7" r="1.6" fill="#cce4ff" opacity=".95" style="animation:twinkle 4s infinite .6s"/>
      <circle cx="94" cy="19" r="1" fill="white" opacity=".85" style="animation:twinkle 2.6s infinite 1.1s"/>
      <circle cx="141" cy="9" r="1.4" fill="white" opacity=".9" style="animation:twinkle 3.6s infinite .35s"/>
      <circle cx="174" cy="24" r="1" fill="#cce4ff" opacity=".88" style="animation:twinkle 4.2s infinite 1.6s"/>
      <circle cx="28" cy="36" r=".9" fill="white" opacity=".75" style="animation:twinkle 5s infinite 2s"/>
      <circle cx="118" cy="31" r="1.1" fill="white" opacity=".82" style="animation:twinkle 3.2s infinite .8s"/>
      <circle cx="72" cy="46" r=".8" fill="white" opacity=".7" style="animation:twinkle 4.6s infinite 1.3s"/>
      <circle cx="165" cy="42" r="1" fill="#cce4ff" opacity=".88" style="animation:twinkle 3.8s infinite .4s"/>

      <!-- Wind flow lines — bright and visible -->
      <path d="M-8,55 C22,43 55,63 95,50 C132,37 162,56 208,46"
            fill="none" stroke="rgba(200,230,255,0.7)" stroke-width="1.8" stroke-linecap="round"
            stroke-dasharray="500" stroke-dashoffset="500"
            style="animation:windLine 3.2s ease-in-out infinite 0s"/>
      <path d="M-8,78 C28,66 62,88 102,74 C142,60 170,80 208,70"
            fill="none" stroke="rgba(180,220,255,0.55)" stroke-width="1.3" stroke-linecap="round"
            stroke-dasharray="500" stroke-dashoffset="500"
            style="animation:windLine 3.8s ease-in-out infinite .9s"/>
      <path d="M-8,100 C32,88 68,108 110,94 C150,80 175,100 208,90"
            fill="none" stroke="rgba(210,235,255,0.6)" stroke-width="1.5" stroke-linecap="round"
            stroke-dasharray="500" stroke-dashoffset="500"
            style="animation:windLine 4.4s ease-in-out infinite 1.8s"/>
      <path d="M-8,120 C26,110 70,128 112,114 C154,100 176,118 208,108"
            fill="none" stroke="rgba(180,220,255,0.4)" stroke-width="1" stroke-linecap="round"
            stroke-dasharray="500" stroke-dashoffset="500"
            style="animation:windLine 5s ease-in-out infinite 2.8s"/>

      <!-- Floating leaves — bright green -->
      <g style="animation:leafDrift1 5.5s linear infinite 0s">
        <path d="M22,90 C25,83 34,84 32,91 C29,98 18,96 22,90Z" fill="#52c46a"/>
        <line x1="22" y1="90" x2="32" y2="91" stroke="#3a9a4e" stroke-width=".8"/>
      </g>
      <g style="animation:leafDrift2 6.2s linear infinite 1.8s">
        <path d="M12,107 C15,99 25,101 22,108 C19,115 8,113 12,107Z" fill="#62d47a"/>
        <line x1="12" y1="107" x2="22" y2="108" stroke="#48aa5a" stroke-width=".8"/>
      </g>
      <g style="animation:leafDrift3 4.8s linear infinite 3.2s">
        <path d="M6,75 C9,68 18,70 16,76 C13,82 3,80 6,75Z" fill="#48b85e"/>
        <line x1="6" y1="75" x2="16" y2="76" stroke="#359048" stroke-width=".8"/>
      </g>

      <!-- Mountain silhouette — visible blue-gray -->
      <path d="M-5,145 L25,102 L52,125 L82,78 L114,102 L140,62 L166,85 L190,55 L208,72 L208,200 L-5,200Z"
            fill="#0f1f35" opacity=".95"/>
      <!-- Mid ground -->
      <path d="M-5,165 L50,148 L100,158 L155,142 L208,152 L208,200 L-5,200Z"
            fill="#0a1825"/>
      <!-- Foreground -->
      <path d="M-5,182 L55,172 L110,178 L165,168 L208,172 L208,200 L-5,200Z"
            fill="#081420"/>

      <!-- Lone pine — visible! -->
      <g transform="translate(162,182)">
        <path d="M0,0 C-2,-16 -4,-35 -1,-58 C2,-74 -3,-88 -8,-105"
              stroke="#1a3550" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M-4,-58 C8,-52 24,-55 34,-50" stroke="#1a3550" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M-2,-74 C10,-68 26,-71 35,-66" stroke="#1a3550" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M-6,-88 C5,-85 18,-88 26,-84" stroke="#1a3550" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </g>

      <!-- Goryczka (sacred wind flower) — bright blue -->
      <g transform="translate(22,174)">
        <line x1="0" y1="0" x2="-2" y2="-22" stroke="#2a8040" stroke-width="1.8"/>
        <circle cx="-2" cy="-22" r="5" fill="#3366dd" opacity=".85"/>
        <circle cx="-2" cy="-22" r="2.5" fill="#99aaff" opacity=".95"/>
      </g>
      <g transform="translate(38,178)">
        <line x1="0" y1="0" x2="1" y2="-16" stroke="#2a8040" stroke-width="1.5"/>
        <circle cx="1" cy="-16" r="3.5" fill="#4477ee" opacity=".75"/>
        <circle cx="1" cy="-16" r="1.8" fill="#aabbff" opacity=".9"/>
      </g>

      <text x="8" y="196" font-family="Georgia,serif" font-size="9"
            fill="rgba(180,220,255,0.55)" letter-spacing="3">WIATR</text>
    </svg>
  </div>

  <!-- ════════════ WATER — top right ════════════ -->
  <div class="q q-water">
    <svg viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="waSky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#040c18"/>
          <stop offset="100%" stop-color="#0c2d45"/>
        </linearGradient>
        <radialGradient id="moonHalo" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(200,225,255,0.35)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
        </radialGradient>
        <radialGradient id="moonFace" cx="40%" cy="38%" r="60%">
          <stop offset="0%" stop-color="#e8f2ff"/>
          <stop offset="70%" stop-color="#c0d8f8"/>
          <stop offset="100%" stop-color="#9abce0"/>
        </radialGradient>
        <filter id="mistBlur"><feGaussianBlur stdDeviation="5"/></filter>
        <filter id="moonGlowF"><feGaussianBlur stdDeviation="6"/></filter>
      </defs>
      <rect width="200" height="200" fill="url(#waSky)"/>

      <!-- Stars -->
      <circle cx="22" cy="11" r="1.2" fill="white" opacity=".92" style="animation:twinkle 3.6s infinite .2s"/>
      <circle cx="78" cy="5" r="1" fill="#c4dcff" opacity=".88" style="animation:twinkle 4.1s infinite 1s"/>
      <circle cx="128" cy="16" r="1.5" fill="white" opacity=".95" style="animation:twinkle 3s infinite .7s"/>
      <circle cx="172" cy="9" r="1.1" fill="white" opacity=".88" style="animation:twinkle 5.2s infinite 0s"/>
      <circle cx="48" cy="26" r=".9" fill="white" opacity=".78" style="animation:twinkle 4.4s infinite 1.8s"/>
      <circle cx="102" cy="21" r="1" fill="#c4dcff" opacity=".85" style="animation:twinkle 3.3s infinite .95s"/>
      <circle cx="155" cy="28" r=".8" fill="white" opacity=".7" style="animation:twinkle 2.8s infinite 1.4s"/>
      <circle cx="32" cy="38" r=".7" fill="white" opacity=".65" style="animation:twinkle 3.5s infinite 2.2s"/>

      <!-- Moon outer glow -->
      <circle cx="148" cy="38" r="35" fill="rgba(180,215,255,0.12)" filter="url(#moonGlowF)"/>
      <!-- Moon halo -->
      <circle cx="148" cy="38" r="22" fill="url(#moonHalo)"/>
      <!-- Moon body -->
      <circle cx="148" cy="38" r="16" fill="url(#moonFace)" style="animation:moonPulse 4.5s ease-in-out infinite"/>
      <!-- Moon craters -->
      <circle cx="143" cy="33" r="3.5" fill="rgba(140,175,215,0.32)"/>
      <circle cx="155" cy="42" r="2.5" fill="rgba(140,175,215,0.26)"/>
      <circle cx="146" cy="46" r="2.8" fill="rgba(140,175,215,0.22)"/>
      <!-- Rim -->
      <circle cx="148" cy="38" r="16" fill="none" stroke="rgba(220,240,255,0.5)" stroke-width="1.5"/>

      <!-- Mountain peaks — visible dark blue -->
      <path d="M-5,120 L22,74 L44,95 L72,48 L96,74 L122,32 L148,70 L172,44 L200,74 L208,64 L208,200 L-5,200Z"
            fill="#061828"/>

      <!-- Waterfall — bright! -->
      <path d="M113,30 C110,62 108,96 112,138 C113,160 110,180 109,200"
            stroke="rgba(140,210,255,0.75)" stroke-width="9" fill="none" stroke-linecap="round"
            style="animation:wfall 1.8s ease-in-out infinite"/>
      <path d="M117,33 C115,65 114,98 116,142 C117,164 115,182 114,200"
            stroke="rgba(175,230,255,0.55)" stroke-width="5" fill="none" stroke-linecap="round"
            style="animation:wfall 1.8s ease-in-out infinite .5s"/>
      <path d="M110,28 C106,60 104,94 108,136 C109,158 107,178 106,200"
            stroke="rgba(120,190,230,0.4)" stroke-width="3" fill="none" stroke-linecap="round"
            style="animation:wfall 1.8s ease-in-out infinite 1s"/>
      <!-- Mist -->
      <ellipse cx="112" cy="196" rx="30" ry="12" fill="rgba(180,228,255,0.28)" filter="url(#mistBlur)"/>

      <!-- Ripples -->
      <ellipse cx="112" cy="193" rx="10" ry="4" fill="none"
               stroke="rgba(140,210,255,0.65)" stroke-width="1.3"
               style="animation:rippleOut 2.2s ease-out infinite 0s;transform-box:fill-box;transform-origin:center"/>
      <ellipse cx="112" cy="193" rx="10" ry="4" fill="none"
               stroke="rgba(140,210,255,0.45)" stroke-width="1"
               style="animation:rippleOut 2.2s ease-out infinite .75s;transform-box:fill-box;transform-origin:center"/>
      <ellipse cx="112" cy="193" rx="10" ry="4" fill="none"
               stroke="rgba(140,210,255,0.28)" stroke-width=".7"
               style="animation:rippleOut 2.2s ease-out infinite 1.5s;transform-box:fill-box;transform-origin:center"/>

      <!-- Water pool -->
      <path d="M15,200 Q112,182 200,200Z" fill="rgba(18,62,105,0.6)"/>
      <!-- Moonlight reflection -->
      <path d="M50,188 C82,182 130,188 158,184" stroke="rgba(180,225,255,0.38)" stroke-width="2" fill="none"/>
      <path d="M68,194 C95,190 132,194 152,192" stroke="rgba(180,225,255,0.22)" stroke-width="1.3" fill="none"/>

      <text x="8" y="196" font-family="Georgia,serif" font-size="9"
            fill="rgba(140,210,255,0.55)" letter-spacing="3">WODA</text>
    </svg>
  </div>

  <!-- ════════════ FIRE — bottom left ════════════ -->
  <div class="q q-fire">
    <svg viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="fSky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0c0202"/>
          <stop offset="55%" stop-color="#1c0606"/>
          <stop offset="100%" stop-color="#2a0c08"/>
        </linearGradient>
        <radialGradient id="fGlow" cx="50%" cy="85%" r="60%">
          <stop offset="0%" stop-color="rgba(255,110,20,0.75)"/>
          <stop offset="45%" stop-color="rgba(220,55,8,0.38)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
        </radialGradient>
        <filter id="fBlur"><feGaussianBlur stdDeviation="6"/></filter>
        <filter id="fSpark"><feGaussianBlur stdDeviation=".8"/></filter>
      </defs>

      <rect width="200" height="200" fill="url(#fSky)"/>

      <!-- Strong underglow -->
      <ellipse cx="100" cy="168" rx="90" ry="50" fill="url(#fGlow)" filter="url(#fBlur)"/>
      <!-- Extra orange wash on ground -->
      <rect x="0" y="155" width="200" height="45" fill="rgba(200,55,10,0.22)"/>

      <!-- Forest pines — visible dark red-brown -->

  <div class="parchment" id="parchment">
    <div class="p-glyph">✦</div>
    <div class="p-title">MAGIC JAR</div>
    <p class="p-sub">Twoja przestrzeń. Tylko Twoja.</p>
    <div class="rune-sep"><span>᛫ ᛭ ᛫</span></div>

    <!-- STEP 1 -->
    <div class="ob-step active" id="ob1">
      <label class="p-label" for="ob-name">Imię</label>
      <input class="p-inp" type="text" id="ob-name"
             placeholder="jak masz na imię..." maxlength="20"
             autocorrect="off" autocapitalize="words" autocomplete="off">
      <label class="p-label" for="ob-year">Rok urodzenia</label>
      <input class="p-inp" type="number" id="ob-year"
             placeholder="np. 1990" min="1950" max="2020" inputmode="numeric">
      <button class="p-btn" onclick="toStep2()">Wchodzę &nbsp; ᚱ</button>
    </div>

    <!-- STEP 2 -->
    <div class="ob-step" id="ob2">
      <button class="back-lnk" onclick="toStep1()">← wróć</button>
      <div class="p-title" style="font-size:17px;margin-bottom:2px;">Twój Słoik</div>
      <p class="p-sub">Wybierz symbol swojej przestrzeni.</p>
      <div class="rune-sep"><span>᛫ ᛭ ᛫</span></div>
      <div class="jar-grid" id="jar-grid"></div>
      <button class="p-btn" onclick="finish()">Zaczynam &nbsp; ᚢ</button>
    </div>

<style>
/* Additional: rippleOut needs transform-origin on the ellipse directly */
</style>

<script>
var JARS=[
  {id:'classic',emoji:'🫙',label:'KLASYCZNY'},
  {id:'heart',  emoji:'❤️', label:'SERCE'},
  {id:'star',   emoji:'⭐', label:'GWIAZDA'},
  {id:'moon',   emoji:'🌙', label:'KSIĘŻYC'},
  {id:'crystal',emoji:'🔮', label:'KRYSZTAŁ'}
];

var S={nick:'',birthYear:0,jarType:'classic'};

// Build jar grid
(function(){
  var g=document.getElementById('jar-grid');
  JARS.forEach(function(j){
    var d=document.createElement('div');
    d.className='jar-opt'+(j.id==='classic'?' sel':'');
    d.innerHTML='<span>'+j.emoji+'</span>'+j.label;
    d.onclick=function(){
      S.jarType=j.id;
      g.querySelectorAll('.jar-opt').forEach(function(x){x.classList.remove('sel');});
      d.classList.add('sel');
    };
    g.appendChild(d);
  });
})();

function toStep2(){
  var n=document.getElementById('ob-name').value.trim();
  var y=parseInt(document.getElementById('ob-year').value);
  if(!n){shake('ob-name');document.getElementById('ob-name').focus();return;}
  if(!y||y<1950||y>2020){shake('ob-year');document.getElementById('ob-year').focus();return;}
  S.nick=n.charAt(0).toUpperCase()+n.slice(1);
  S.birthYear=y;
  document.getElementById('ob1').classList.remove('active');
  document.getElementById('ob2').classList.add('active');
}

function toStep1(){
  document.getElementById('ob2').classList.remove('active');
  document.getElementById('ob1').classList.add('active');
}

function finish(){
  // Handoff to main app — here just confirms
  var age=new Date().getFullYear()-S.birthYear;
  console.log('Magic Jar state:', S, '| Wiek:', age);
  document.querySelector('.p-btn').textContent='Witaj, '+S.nick+' ✦';
  document.querySelector('.p-btn').style.color='#f0cc60';
}

function shake(id){
  var el=document.getElementById(id);
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
  setTimeout(function(){el.classList.remove('shake');},400);
}

// Enter key navigation
document.getElementById('ob-name').addEventListener('keydown',function(e){
  if(e.key==='Enter')document.getElementById('ob-year').focus();
});
document.getElementById('ob-year').addEventListener('keydown',function(e){
  if(e.key==='Enter')toStep2();
});
</script>

</body>
</html>
